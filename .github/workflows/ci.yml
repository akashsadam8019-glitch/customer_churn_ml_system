name: Customer Churn ML CI

on:
  push:
    branches:
      - master
      - main

  pull_request:
    branches:
      - master
      - main

jobs:
  build-and-test:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Verify Project Imports
        run: |
          python -c "from src.pipeline.training_pipeline import TrainingPipeline"
          python -c "from src.pipeline.prediction_pipeline import PredictionPipeline"

      - name: Run Training Pipeline
        run: |
          python main.py

      - name: Build Docker Image
        run: |
          docker build -t customer-churn-api .